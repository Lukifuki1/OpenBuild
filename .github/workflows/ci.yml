name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

env:
  PYTHON_VERSION: '3.10'
  NODE_VERSION: '20'

jobs:
  lint:
    name: Lint Code
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: Install dependencies
        run: |
          pip install ruff black isort
      
      - name: Run Ruff linter
        run: ruff check .
      
      - name: Check formatting with Black
        run: black --check openhands/ frontend/src
      
      - name: Check imports with isort
        run: isort --check-only openhands/

  type-check:
    name: Type Check
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: Install dependencies
        run: |
          pip install mypy
      
      - name: Run type checker
        run: mypy openhands/ --ignore-missing-imports

  test-backend:
    name: Test Backend (Python)
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: Install dependencies
        run: |
          pip install pytest pytest-asyncio httpx
          pip install -e .
      
      - name: Run unit tests
        run: |
          pytest tests/unit/ -v --cov=openhands/server/services --cov-report=xml
      
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          file: ./coverage.xml
          flags: backend

  test-frontend:
    name: Test Frontend (TypeScript)
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      
      - name: Install dependencies
        run: |
          cd frontend
          npm install
      
      - name: Run TypeScript check
        run: |
          cd frontend
          npx tsc --noEmit
      
      - name: Run unit tests
        run: |
          cd frontend
          npm test

  build-docker:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: [lint, type-check, test-backend, test-frontend]
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Build Docker image
        run: |
          docker build -t openbuild:${{ github.sha }} .
      
      - name: Test Docker image
        run: |
          docker run --rm openbuild:${{ github.sha }} python --version

  integration-test:
    name: Integration Tests
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: Install dependencies
        run: |
          pip install pytest pytest-asyncio httpx redis
      
      - name: Run integration tests
        run: |
          pytest tests/integration/ -v --tb=short

  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [build-docker]
    if: github.ref == 'refs/heads/main'
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Deploy to staging
        run: |
          echo "Deploying to staging environment..."
          # Add deployment commands here (e.g., kubectl, docker-compose)
          # Example: kubectl set image deployment/openbuild openbuild=openbuild:${{ github.sha }}

  notify:
    name: Notify on Success/Failure
    runs-on: ubuntu-latest
    needs: [lint, type-check, test-backend, test-frontend, build-docker]
    
    steps:
      - name: Slack notification (success)
        if: success()
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ job.status }}
          text: '✅ OpenBuild CI/CD Pipeline completed successfully!'
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK }}
      
      - name: Slack notification (failure)
        if: failure()
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ job.status }}
          text: '❌ OpenBuild CI/CD Pipeline failed!'
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK }}
