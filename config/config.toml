################################################################################
# OpenBuild — OpenHands v0.62.0 Konfiguracija
################################################################################
# Ta datoteka eksplicitno nastavi vse parametre za runtime, orodja in pravice.
# OpenHands jo prebere ob zagonu iz /.openhands/config.toml (mount v kontejner).
################################################################################

#################################### Core ####################################
[core]
# Runtime: Docker (ustvarja sandbox kontejnerje prek Docker socket-a)
runtime = "docker"

# Privzeti agent
default_agent = "CodeActAgent"

# Brskalnik omogocen (Playwright/BrowserGym)
enable_browser = true

# Brez omejitve proracuna
max_budget_per_task = 0.0

# Maksimalno stevilo iteracij agenta
max_iterations = 500

# Workspace pot v sandbox-u
workspace_mount_path_in_sandbox = "/workspace"

# Teci kot openhands (pravilne pravice)
run_as_openhands = true

# Brez omejitve velikosti datotek
file_uploads_max_file_size_mb = 0
file_uploads_restrict_file_types = false
file_uploads_allowed_extensions = [".*"]

#################################### LLM #####################################
[llm]
# Qwen3-Coder:30B prek Ollama serverja (fiksno)
model = "ollama/qwen3-coder:30b"
api_key = "local-key"
base_url = "http://host.docker.internal:11434"

# KRITICNO: native_tool_calling MORA biti true za Ollama/Qwen3 modele!
# Brez tega OpenHands NE posreduje orodij (execute_bash, str_replace_editor, ...)
# modelu v native function calling formatu. Model potem halucinira imena orodij
# (npr. 'execute_task' namesto 'execute_bash') in execution ne deluje.
# Ref: https://github.com/OpenHands/OpenHands/issues/8140
native_tool_calling = true

# Ollama-specificne nastavitve
temperature = 0.0
num_retries = 8
retry_max_wait = 120
retry_min_wait = 15

#################################### Agent ###################################
[agent]
# === ORODJA (vsa eksplicitno omogocena) ===

# Shell/Bash orodje — izvrsevanje ukazov
enable_cmd = true

# Urejevalnik datotek (str_replace_editor)
enable_editor = true

# Brskanje po spletu (Playwright/BrowserGym)
enable_browsing = true

# SoM vizualno brskanje
enable_som_visual_browsing = true

# Jupyter/IPython orodje
enable_jupyter = true

# Think orodje (razmisljanje)
enable_think = true

# Finish orodje (zakljucitev naloge)
enable_finish = true

# MCP orodja (Model Context Protocol)
enable_mcp = true

# LLM editor izklopljen (uporabljamo standardnega)
enable_llm_editor = false

# Prompt razsiritve omogocene
enable_prompt_extensions = true

# Rezanje zgodovine omogoceno (za dolge seje)
enable_history_truncation = true

# Plan mode omogocen (za kompleksne naloge)
enable_plan_mode = true

#################################### Sandbox ###################################
# POMEMBNO: Execution container-ji so EFEMERNI (per-session).
# Lifecycle upravlja OpenHands backend, ne Docker Compose.
# Runtime image (runtime:0.62-nikolaik) vsebuje celoten OpenHands runtime stack
# (Runtime API server + agent_skills + tool execution engine + base tools).
# To NI samo nikolaik/python-nodejs — brez OpenHands layer-ja execution ne deluje.
##############################################################################
[sandbox]
# Timeout za sandbox akcije (sekunde)
timeout = 120

# Timeout za inicializacijo runtime-a (handshake) — ce runtime API ne vrne READY
# v tem casu, se seja ne zazene. Povecaj ce mas pocasnejso mrező ali disk.
remote_runtime_init_timeout = 180

# Base image za sandbox (osnova za runtime build)
base_container_image = "nikolaik/python-nodejs:python3.12-nodejs22"

# UID za sandbox uporabnika — MORA ustrezati host UID za pravilne pravice
# start.sh avtomatsko zazna in nastavi prek SANDBOX_USER_ID env var.
# Ce UID ne ustreza: permission denied, git/pip napake v workspace-u.
# Privzeto: 1000 (standardni Linux uporabnik)
user_id = 1000

# Inicializacija pluginov (Jupyter, agent_skills) — OBVEZNO za execution
# Brez tega: runtime API se ne inicializira, orodja se ne registrirajo,
# handshake READY signal ne pride.
initialize_plugins = true

# Auto-lint po urejanju
enable_auto_lint = false

# Host omrezje izklopljeno (sandbox je izoliran, a ima dostop do interneta)
use_host_network = false

# Lifecycle nastavitve za efemerne execution container-je:
# keep_runtime_alive: ce true, container ostane po koncu seje (za debugging)
keep_runtime_alive = false

# pause_closed_runtimes: ce true, container se pavzira namesto odstrani
pause_closed_runtimes = true

# close_delay: zakasnitev pred odstranitvijo (sekunde)
close_delay = 3600

#################################### Security ###################################
[security]
# Potrditveni nacin IZKLOPLJEN — agent izvrsuje brez vprasevanja
confirmation_mode = false

# Brez varnostnega analizatorja — polne pravice za izvrsevanje
# security_analyzer = ""
