# ============================================
# OpenBuild + OpenHands v0.62.0
# Docker Compose GPU Override — NVIDIA
# ============================================
# Uporaba: docker compose -f docker-compose.yml -f docker-compose.gpu.yml up -d
# start.sh avtomatsko zazna GPU in uporabi ta override.
# ============================================

services:
  openhands:
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
