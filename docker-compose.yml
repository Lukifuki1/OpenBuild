# ============================================
# OpenBuild + OpenHands v0.62.0
# Docker Compose — produkcijska konfiguracija
# ============================================
# Zagon: docker compose up -d
# Uporabi start.sh za celoten bootstrap.
# ============================================

services:
  openhands:
    image: docker.openhands.dev/openhands/openhands:0.62
    container_name: openbuild-openhands
    restart: unless-stopped
    stdin_open: true
    tty: true

    environment:
      # --- Runtime / Sandbox ---
      - SANDBOX_RUNTIME_CONTAINER_IMAGE=${SANDBOX_RUNTIME_CONTAINER_IMAGE:-docker.openhands.dev/openhands/runtime:0.62-nikolaik}
      - WORKSPACE_MOUNT_PATH=${WORKSPACE_BASE:-./workspace}
      - SANDBOX_USER_ID=${SANDBOX_USER_ID:-1000}
      - SANDBOX_VOLUMES=${SANDBOX_VOLUMES:-}
      # --- LLM (Qwen3-Coder:30B prek Ollama) ---
      - LLM_API_KEY=${LLM_API_KEY:-local-key}
      - LLM_MODEL=${LLM_MODEL:-ollama/qwen3-coder:30b}
      - LLM_BASE_URL=${LLM_BASE_URL:-http://host.docker.internal:11434}
      # KRITICNO: native_tool_calling MORA biti false za Ollama modele!
      # OpenHands 0.62 ima qwen3-coder v FUNCTION_CALLING_PATTERNS seznamu,
      # kar pomeni da privzeto poslje tools v native formatu prek Ollama API.
      # Ollama pa NE podpira native tool calling pravilno — model halucinira
      # tool imena (npr. 'execute_task' namesto 'execute_bash') in Ollama API
      # vrne 'Operation not allowed' napako.
      # Z native_tool_calling=false OpenHands uporabi "mock" function calling:
      # orodja opisana v system promptu kot tekst, model vrne tekst,
      # OpenHands fn_call_converter.py ga pretvori nazaj v function call format.
      - LLM_NATIVE_TOOL_CALLING=false
      # --- Logiranje ---
      - LOG_ALL_EVENTS=${LOG_ALL_EVENTS:-true}
      # --- Varnost ---
      - JWT_SECRET=${JWT_SECRET:-}

    ports:
      - "${OPENHANDS_PORT:-3000}:3000"

    extra_hosts:
      # Omogoca komunikacijo med kontejnerji in host-om
      # Kljucno za: Docker-in-Docker, Ollama dostop, sandbox mreza
      - "host.docker.internal:host-gateway"

    volumes:
      # Docker socket — omogoca OpenHands ustvarjanje in upravljanje sandbox kontejnerjev
      # Brez tega agent NE MORE izvrsevati ukazov ali zaganjati projektov
      - /var/run/docker.sock:/var/run/docker.sock
      # Stanje OpenHands (pogovori, nastavitve, settings.json)
      # POMEMBNO: host bind mount (ne named volume!) — sicer kontejner ne more pisati settings.json
      # Uradni OpenHands pristop: docker run -v ~/.openhands:/.openhands
      - ${OPENHANDS_STATE_DIR:-./.openhands-state}:/.openhands
      # Workspace za agenta (zapisljiv, deljeno z gostiteljem)
      - ${WORKSPACE_BASE:-./workspace}:/opt/workspace_base
      # Konfiguracija — config.toml MORA biti mountan na /app/config.toml!
      # OpenHands isce config.toml relativno na CWD (/app), NE na /.openhands/.
      # Napacen mount (/.openhands/config.toml) povzroci: "config.toml not found"
      # in vse nastavitve se ignorirajo.
      - ./config/config.toml:/app/config.toml:ro

    networks:
      - openbuild-net

    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3000/ || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

    deploy:
      resources:
        limits:
          memory: 8G
          cpus: "8"
        reservations:
          memory: 2G
          cpus: "2"

networks:
  openbuild-net:
    name: openbuild-net
    driver: bridge

# Brez named volumes — /.openhands je host bind mount (OPENHANDS_STATE_DIR)
# volumes:
